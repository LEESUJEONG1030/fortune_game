<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>오늘의 운세</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: linear-gradient(135deg, #1a0533 0%, #2d0a5e 50%, #0d1b4b 100%);
    min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
    overflow: hidden;
  }
  .stars { position: fixed; top:0; left:0; width:100%; height:100%; pointer-events:none; z-index:0; }
  .star { position:absolute; background:white; border-radius:50%; animation:twinkle 2s infinite alternate; }
  @keyframes twinkle { from{opacity:0.2} to{opacity:1} }

  .container { position:relative; z-index:1; text-align:center; padding:20px; max-width:440px; width:100%; }

  h1 { color:#ffd700; font-size:2rem; font-weight:900; text-shadow:0 0 20px rgba(255,215,0,0.8); margin-bottom:6px; }
  .subtitle { color:#c9a8ff; font-size:0.85rem; margin-bottom:28px; }

  /* STEP 1 */
  .input-box {
    background: rgba(255,255,255,0.07);
    border: 2px solid rgba(200,150,255,0.3);
    border-radius: 20px;
    padding: 28px 24px;
    margin-bottom: 20px;
    backdrop-filter: blur(8px);
  }
  .field-label { color:#c9a8ff; font-size:0.8rem; margin-bottom:8px; text-align:left; }
  .date-row { display:flex; gap:8px; margin-bottom:20px; }
  .date-select {
    flex:1; background:rgba(255,255,255,0.1); border:2px solid rgba(200,150,255,0.3);
    border-radius:12px; padding:10px 8px; color:white; font-size:0.9rem;
    font-family:'Noto Sans KR',sans-serif; cursor:pointer; outline:none;
    transition: border-color 0.2s;
  }
  .date-select:focus { border-color:#ffd700; }
  .date-select option { background:#2d0a5e; color:white; }

  .gender-row { display:flex; gap:12px; }
  .gender-btn {
    flex:1; background:rgba(255,255,255,0.08); border:2px solid rgba(200,150,255,0.25);
    border-radius:16px; padding:14px; cursor:pointer; color:white;
    transition:all 0.2s; font-family:'Noto Sans KR',sans-serif;
  }
  .gender-btn:hover { background:rgba(200,150,255,0.2); border-color:#c9a8ff; }
  .gender-btn.selected { background:rgba(200,150,255,0.35); border-color:#ffd700; box-shadow:0 0 12px rgba(255,215,0,0.4); }
  .gender-icon { font-size:2rem; display:block; }
  .gender-name { font-size:0.85rem; margin-top:6px; color:#e0c8ff; }

  /* STEP 2 */
  #step2 { display:none; }
  .card-area { perspective:800px; margin:20px auto; width:180px; height:260px; }
  .card {
    width:100%; height:100%; position:relative;
    transform-style:preserve-3d; transition:transform 0.8s ease; cursor:pointer;
  }
  .card.flipped { transform:rotateY(180deg); }
  .card-front, .card-back {
    position:absolute; width:100%; height:100%; border-radius:20px;
    backface-visibility:hidden; display:flex; flex-direction:column;
    align-items:center; justify-content:center;
  }
  .card-front {
    background:linear-gradient(135deg,#4a0080,#7b00cc);
    border:3px solid #ffd700; box-shadow:0 0 30px rgba(255,215,0,0.4);
  }
  .card-front-emoji { font-size:4rem; animation:float 3s ease-in-out infinite; }
  @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-10px)} }
  .card-front p { color:#ffd700; font-size:0.8rem; margin-top:10px; }
  .card-back {
    background:linear-gradient(135deg,#1a0045,#35007a);
    border:3px solid #ffd700; transform:rotateY(180deg); padding:20px;
  }
  .card-back .big-emoji { font-size:3.5rem; margin-bottom:8px; }
  .card-back .fortune-title { color:#ffd700; font-size:1rem; font-weight:700; margin-bottom:8px; }
  .card-back .fortune-text { color:#e0c8ff; font-size:0.78rem; line-height:1.6; }

  /* STEP 3 */
  #step3 { display:none; }
  .result-card {
    background:rgba(255,255,255,0.07); border:2px solid rgba(200,150,255,0.4);
    border-radius:24px; padding:24px; margin-bottom:16px; backdrop-filter:blur(10px);
  }
  .result-header { display:flex; align-items:center; gap:12px; margin-bottom:16px; }
  .result-avatar { font-size:2.8rem; }
  .result-name { color:#ffd700; font-size:1.1rem; font-weight:700; }
  .result-info { color:#c9a8ff; font-size:0.75rem; }

  .score-row { display:grid; grid-template-columns:repeat(3,1fr); gap:12px; margin-bottom:16px; }
  .score-item { text-align:center; }
  .score-label { color:#c9a8ff; font-size:0.7rem; margin-bottom:4px; }
  .score-stars { font-size:0.9rem; }

  .fortune-sections { text-align:left; }
  .fortune-section { margin-bottom:12px; }
  .section-title { color:#ffd700; font-size:0.8rem; font-weight:700; display:flex; align-items:center; gap:6px; margin-bottom:4px; }
  .section-body { color:#e0c8ff; font-size:0.8rem; line-height:1.6; }

  .lucky-row { display:flex; gap:10px; flex-wrap:wrap; margin-top:14px; }
  .lucky-chip {
    background:rgba(255,215,0,0.15); border:1px solid rgba(255,215,0,0.4);
    border-radius:20px; padding:4px 12px; font-size:0.75rem; color:#ffd700;
  }

  .btn {
    background:linear-gradient(135deg,#7b00cc,#c9a8ff); color:white; border:none;
    border-radius:50px; padding:13px 36px; font-size:1rem; font-weight:700;
    cursor:pointer; transition:all 0.2s; font-family:'Noto Sans KR',sans-serif;
  }
  .btn:hover { transform:scale(1.05); box-shadow:0 0 20px rgba(200,150,255,0.6); }
  .btn:disabled { opacity:0.5; cursor:not-allowed; transform:none; }
  .btn-small {
    background:rgba(255,255,255,0.08); border:1px solid rgba(255,255,255,0.2);
    color:#c9a8ff; border-radius:50px; padding:8px 20px; font-size:0.85rem;
    cursor:pointer; font-family:'Noto Sans KR',sans-serif; margin-top:10px; transition:all 0.2s;
  }
  .btn-small:hover { background:rgba(255,255,255,0.14); }

  .error-msg { color:#ff8080; font-size:0.78rem; margin-top:-12px; margin-bottom:12px; }
</style>
</head>
<body>
<div class="stars" id="stars"></div>
<div class="container">

  <!-- STEP 1: 정보 입력 -->
  <div id="step1">
    <h1>🔮 오늘의 운세</h1>
    <p class="subtitle">생년월일과 성별을 입력하고 운세를 확인하세요</p>
    <div class="input-box">
      <div class="field-label">🎂 생년월일</div>
      <div class="date-row">
        <select class="date-select" id="selYear">
          <option value="">년도</option>
        </select>
        <select class="date-select" id="selMonth">
          <option value="">월</option>
        </select>
        <select class="date-select" id="selDay">
          <option value="">일</option>
        </select>
      </div>
      <div class="field-label">👤 성별</div>
      <div class="gender-row">
        <button class="gender-btn" onclick="selectGender('여성',this)">
          <span class="gender-icon">👩</span>
          <span class="gender-name">여성</span>
        </button>
        <button class="gender-btn" onclick="selectGender('남성',this)">
          <span class="gender-icon">👨</span>
          <span class="gender-name">남성</span>
        </button>
      </div>
    </div>
    <div class="error-msg" id="errMsg" style="display:none">생년월일과 성별을 모두 선택해 주세요!</div>
    <button class="btn" onclick="goStep2()">카드 뽑으러 가기 ✨</button>
  </div>

  <!-- STEP 2: 카드 뽑기 -->
  <div id="step2">
    <h1>🃏 카드 뽑기</h1>
    <p class="subtitle" id="step2Sub"></p>
    <div class="card-area">
      <div class="card" id="tarotCard" onclick="flipCard()">
        <div class="card-front">
          <span class="card-front-emoji">🌟</span>
          <p>탭하여 운세 확인</p>
        </div>
        <div class="card-back">
          <div class="big-emoji" id="cardEmoji"></div>
          <div class="fortune-title" id="cardTitle"></div>
          <div class="fortune-text" id="cardText"></div>
        </div>
      </div>
    </div>
    <button class="btn" id="revealBtn" onclick="goStep3()" disabled>전체 운세 보기 🌈</button>
    <br>
    <button class="btn-small" onclick="goBack()">← 다시 입력</button>
  </div>

  <!-- STEP 3: 결과 -->
  <div id="step3">
    <h1>✨ 오늘의 운세</h1>
    <p class="subtitle" id="step3Date"></p>
    <div class="result-card">
      <div class="result-header">
        <div class="result-avatar" id="resAvatar"></div>
        <div>
          <div class="result-name" id="resName"></div>
          <div class="result-info" id="resInfo"></div>
        </div>
      </div>
      <div class="score-row" id="scoreRow"></div>
      <div class="fortune-sections" id="fortuneSections"></div>
      <div class="lucky-row" id="luckyRow"></div>
    </div>
    <button class="btn" onclick="restart()">🔄 다시 뽑기</button>
  </div>

</div>
<script>
// 별 생성
const starsEl = document.getElementById('stars');
for(let i=0;i<60;i++){
  const s=document.createElement('div'); s.className='star';
  s.style.left=Math.random()*100+'%'; s.style.top=Math.random()*100+'%';
  s.style.animationDelay=Math.random()*2+'s';
  const sz=(Math.random()*3+1)+'px'; s.style.width=s.style.height=sz;
  starsEl.appendChild(s);
}

// 년도/월/일 채우기
const sy=document.getElementById('selYear');
const sm=document.getElementById('selMonth');
const sd=document.getElementById('selDay');
const cur=new Date().getFullYear();
for(let y=cur;y>=1940;y--){ const o=document.createElement('option'); o.value=y; o.textContent=y+'년'; sy.appendChild(o); }
for(let m=1;m<=12;m++){ const o=document.createElement('option'); o.value=m; o.textContent=m+'월'; sm.appendChild(o); }
function fillDays(year,month){
  const prev=sd.value;
  sd.innerHTML='<option value="">일</option>';
  const max=new Date(year||2000,(month||1),0).getDate();
  for(let d=1;d<=max;d++){ const o=document.createElement('option'); o.value=d; o.textContent=d+'일'; sd.appendChild(o); }
  if(prev && prev<=max) sd.value=prev;
}
sy.onchange=()=>fillDays(sy.value,sm.value);
sm.onchange=()=>fillDays(sy.value,sm.value);
fillDays(2000,1);

let selectedGender=null;
let fortuneData=null;

function selectGender(g,btn){
  selectedGender=g;
  document.querySelectorAll('.gender-btn').forEach(b=>b.classList.remove('selected'));
  btn.classList.add('selected');
}

const cardMessages=[
  {emoji:'☀️',title:'태양 카드',text:'밝은 에너지가 당신을 감쌉니다. 자신감을 가지세요!'},
  {emoji:'🌙',title:'달 카드',text:'직감이 강해지는 날. 내면의 목소리에 귀 기울이세요.'},
  {emoji:'⭐',title:'별 카드',text:'소원이 이루어지는 징조. 꿈을 향해 나아가세요!'},
  {emoji:'🌈',title:'무지개 카드',text:'좋은 변화가 찾아옵니다. 열린 마음으로 받아들이세요.'},
  {emoji:'🦋',title:'나비 카드',text:'변신의 시기. 새로운 시작을 두려워하지 마세요.'},
  {emoji:'🌸',title:'꽃 카드',text:'아름다운 인연이 피어납니다. 주변을 돌아보세요.'},
  {emoji:'💫',title:'유성 카드',text:'특별한 기회가 찾아옵니다. 놓치지 마세요!'},
  {emoji:'🔮',title:'수정구슬 카드',text:'통찰력이 높아지는 날. 중요한 결정에 좋은 때입니다.'},
];

const fortunePool={
  love:[
    '오늘은 소중한 사람에게 먼저 연락해 보세요. 따뜻한 반응이 기다립니다.',
    '새로운 인연의 씨앗이 싹트고 있어요. 열린 마음을 가지세요.',
    '파트너와의 소소한 대화가 관계를 더욱 깊게 만들어줄 거예요.',
    '조금 기다려보세요. 인연은 가장 적절한 때에 찾아온답니다.',
    '진심을 표현하면 상대방도 마음을 열 거예요. 용기를 내세요!',
  ],
  money:[
    '불필요한 지출을 줄이고 계획적으로 소비하면 좋은 날입니다.',
    '예상치 못한 수입이 생길 수도 있어요. 기대해 보세요!',
    '재정 계획을 다시 점검해보는 것이 도움이 됩니다.',
    '작은 절약이 큰 여유를 만들어요. 오늘부터 시작해보세요.',
    '투자보다는 저축에 집중하면 안정감을 얻을 수 있어요.',
  ],
  work:[
    '꼼꼼하게 준비한 일들이 빛을 발하는 날입니다. 자신감을 갖세요!',
    '팀워크가 중요한 날. 동료와 협력하면 시너지가 납니다.',
    '새로운 아이디어가 떠오를 수 있어요. 바로 메모해두세요.',
    '완벽하려 하기보다 먼저 시작하는 것이 중요한 하루입니다.',
    '오늘의 노력이 나중에 큰 성과로 돌아올 거예요.',
  ],
  health:[
    '충분한 수면과 수분 섭취로 컨디션을 챙겨보세요.',
    '스트레칭이나 가벼운 산책이 기분 전환에 도움이 될 거예요.',
    '오늘은 마음의 여유를 찾는 시간을 가져보세요.',
    '과로를 피하고 규칙적인 식사로 에너지를 보충하세요.',
    '좋아하는 음악을 들으며 긍정적인 하루를 만들어보세요.',
  ],
};

const luckyColors=['빨강','주황','노랑','초록','파랑','보라','분홍','하늘','민트','라벤더'];
const luckyItems=['☕ 커피','🍀 네잎클로버','📚 책','🎵 음악','🌿 식물','💌 편지','🕯️ 촛불','🪴 화분'];

function rnd(arr){ return arr[Math.floor(Math.random()*arr.length)]; }

// 생년월일로 시드 생성 (같은 날 같은 결과)
function seededRnd(seed, max){
  let x = Math.sin(seed+1)*10000;
  return Math.floor((x-Math.floor(x))*max);
}

function getZodiac(m,d){
  const dates=[[1,20,'물병자리'],[2,19,'물고기자리'],[3,21,'양자리'],[4,20,'황소자리'],
    [5,21,'쌍둥이자리'],[6,22,'게자리'],[7,23,'사자자리'],[8,23,'처녀자리'],
    [9,23,'천칭자리'],[10,23,'전갈자리'],[11,22,'사수자리'],[12,22,'염소자리']];
  for(let i=0;i<dates.length;i++){
    if(m===dates[i][0] && d<dates[i][1]) return dates[(i+11)%12][2];
    if(m===dates[i][0] && d>=dates[i][1]) return dates[i][2];
  }
  return '염소자리';
}

function generateFortune(year,month,day,gender){
  const today=new Date();
  const seed=year*10000+month*100+day+today.getDate()*31+today.getMonth()*365;
  const age=today.getFullYear()-year;
  const zodiac=getZodiac(month,day);
  const card=cardMessages[seededRnd(seed,cardMessages.length)];
  return {
    year,month,day,gender,age,zodiac,card,
    scores:{
      love: (seededRnd(seed+1,3)+3),
      money:(seededRnd(seed+2,3)+3),
      work: (seededRnd(seed+3,3)+3),
    },
    love:fortunePool.love[seededRnd(seed+4,fortunePool.love.length)],
    money:fortunePool.money[seededRnd(seed+5,fortunePool.money.length)],
    work:fortunePool.work[seededRnd(seed+6,fortunePool.work.length)],
    health:fortunePool.health[seededRnd(seed+7,fortunePool.health.length)],
    luckyColor:luckyColors[seededRnd(seed+8,luckyColors.length)],
    luckyNumber:(seededRnd(seed+9,9)+1),
    luckyItem:luckyItems[seededRnd(seed+10,luckyItems.length)],
  };
}

function goStep2(){
  const y=sy.value, m=sm.value, d=sd.value;
  if(!y||!m||!d||!selectedGender){
    document.getElementById('errMsg').style.display='block'; return;
  }
  document.getElementById('errMsg').style.display='none';
  fortuneData=generateFortune(+y,+m,+d,selectedGender);
  const card=fortuneData.card;
  document.getElementById('cardEmoji').textContent=card.emoji;
  document.getElementById('cardTitle').textContent=card.title;
  document.getElementById('cardText').textContent=card.text;
  document.getElementById('step2Sub').textContent=
    `${fortuneData.gender==='여성'?'👩':'👨'} ${y}년생 ${fortuneData.zodiac}의 카드를 뽑아보세요`;
  document.getElementById('tarotCard').classList.remove('flipped');
  document.getElementById('revealBtn').disabled=true;
  document.getElementById('step1').style.display='none';
  document.getElementById('step2').style.display='block';
}

function flipCard(){
  const card=document.getElementById('tarotCard');
  if(card.classList.contains('flipped')) return;
  card.classList.add('flipped');
  setTimeout(()=>{ document.getElementById('revealBtn').disabled=false; },900);
}

function goStep3(){
  document.getElementById('step2').style.display='none';
  document.getElementById('step3').style.display='block';
  renderResult();
}

function renderResult(){
  const d=fortuneData;
  const now=new Date();
  document.getElementById('step3Date').textContent=
    `${now.getFullYear()}년 ${now.getMonth()+1}월 ${now.getDate()}일 운세`;
  document.getElementById('resAvatar').textContent=d.gender==='여성'?'👩':'👨';
  document.getElementById('resName').textContent=`${d.year}년생 ${d.gender}`;
  document.getElementById('resInfo').textContent=
    `${d.month}월 ${d.day}일생 · ${d.zodiac} · 만 ${now.getFullYear()-d.year}세`;

  const star=n=>'⭐'.repeat(n)+'☆'.repeat(5-n);
  document.getElementById('scoreRow').innerHTML=`
    <div class="score-item"><div class="score-label">💕 애정운</div><div class="score-stars">${star(d.scores.love)}</div></div>
    <div class="score-item"><div class="score-label">💰 금전운</div><div class="score-stars">${star(d.scores.money)}</div></div>
    <div class="score-item"><div class="score-label">💼 직장운</div><div class="score-stars">${star(d.scores.work)}</div></div>
  `;
  document.getElementById('fortuneSections').innerHTML=`
    <div class="fortune-section"><div class="section-title">💕 애정운</div><div class="section-body">${d.love}</div></div>
    <div class="fortune-section"><div class="section-title">💰 금전운</div><div class="section-body">${d.money}</div></div>
    <div class="fortune-section"><div class="section-title">💼 직장운</div><div class="section-body">${d.work}</div></div>
    <div class="fortune-section"><div class="section-title">🌿 건강운</div><div class="section-body">${d.health}</div></div>
  `;
  document.getElementById('luckyRow').innerHTML=`
    <div class="lucky-chip">🎨 ${d.luckyColor}</div>
    <div class="lucky-chip">🔢 ${d.luckyNumber}</div>
    <div class="lucky-chip">${d.luckyItem}</div>
  `;
}

function goBack(){
  document.getElementById('step2').style.display='none';
  document.getElementById('step1').style.display='block';
}

function restart(){
  document.getElementById('step3').style.display='none';
  document.getElementById('step1').style.display='block';
}
</script>
</body>
</html>
